<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${modoEdicao} ? 'Editar Autor' : 'Novo Autor', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <span class="page-eyebrow">Autores</span>
            <h1 th:text="${modoEdicao} ? 'Editar autor' : 'Novo autor'">Autor</h1>
            <p class="page-subtitle" th:text="${modoEdicao} ? 'Atualizacao do cadastro' : 'Novo cadastro'">Cadastro</p>
        </div>
        <a class="btn btn-outline-secondary btn-action" th:href="@{/autores}">
            <i class="bi bi-arrow-left" aria-hidden="true"></i>
            <span>Voltar</span>
        </a>
    </div>

    <div th:if="${apiErrors}" class="alert app-alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill" aria-hidden="true"></i>
        <div>
        <div class="fw-semibold mb-1">A API retornou erros de validação:</div>
        <ul class="mb-0">
            <li th:each="erroApi : ${apiErrors}" th:text="${erroApi.key + ': ' + erroApi.value}">Erro</li>
        </ul>
        </div>
    </div>

    <form class="form-panel narrow-panel"
          method="post"
          th:object="${autorForm}"
          th:action="${modoEdicao} ? @{/autores/{id}(id=${autorId})} : @{/autores}">
        <div class="panel-title">
            <i class="bi bi-person-vcard" aria-hidden="true"></i>
            <span>Dados do autor</span>
        </div>

        <div class="field-group">
            <label for="nome" class="form-label">Nome</label>
            <input id="nome" type="text" class="form-control" th:field="*{nome}"
                   th:classappend="${#fields.hasErrors('nome')} ? ' is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
        </div>

        <div class="field-group">
            <label for="nacionalidade" class="form-label">Nacionalidade</label>
            <input id="nacionalidade" type="text" class="form-control" th:field="*{nacionalidade}"
                   th:classappend="${#fields.hasErrors('nacionalidade')} ? ' is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('nacionalidade')}"
                 th:errors="*{nacionalidade}"></div>
        </div>

        <div class="field-group">
            <label for="anoNascimento" class="form-label">Ano de nascimento</label>
            <input id="anoNascimento" type="number" min="1" class="form-control" th:field="*{anoNascimento}"
                   th:classappend="${#fields.hasErrors('anoNascimento')} ? ' is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('anoNascimento')}"
                 th:errors="*{anoNascimento}"></div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-action">
                <i class="bi bi-check2" aria-hidden="true"></i>
                <span th:text="${modoEdicao} ? 'Atualizar' : 'Salvar'">Salvar</span>
            </button>
            <a class="btn btn-outline-secondary btn-action" th:href="@{/autores}">
                <i class="bi bi-x-lg" aria-hidden="true"></i>
                <span>Cancelar</span>
            </a>
        </div>
    </form>
</section>
</html>
