<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Autores', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <span class="page-eyebrow">Cadastro</span>
            <h1>Autores</h1>
            <p class="page-subtitle">
                <span th:text="${#lists.size(autores)}">0</span>
                <span th:text="${#lists.size(autores) == 1} ? 'registro cadastrado' : 'registros cadastrados'">registros cadastrados</span>
            </p>
        </div>
        <a class="btn btn-primary btn-action" th:href="@{/autores/novo}">
            <i class="bi bi-plus-lg" aria-hidden="true"></i>
            <span>Novo Autor</span>
        </a>
    </div>

    <div class="table-panel table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th>Nome</th>
                <th>Nacionalidade</th>
                <th>Ano de nascimento</th>
                <th class="text-end">Acoes</th>
            </tr>
            </thead>
            <tbody>
            <tr class="empty-row" th:if="${#lists.isEmpty(autores)}">
                <td colspan="4">
                    <div class="empty-state">
                        <i class="bi bi-person-x" aria-hidden="true"></i>
                        <strong>Nenhum autor cadastrado.</strong>
                    </div>
                </td>
            </tr>
            <tr th:each="autor : ${autores}">
                <td class="fw-medium" data-label="Nome" th:text="${autor.nome}">Nome</td>
                <td data-label="Nacionalidade" th:text="${autor.nacionalidade}">Nacionalidade</td>
                <td data-label="Ano de nascimento" th:text="${autor.anoNascimento}">1900</td>
                <td class="text-end" data-label="Acoes">
                    <div class="table-actions">
                        <a class="btn btn-sm btn-soft-secondary"
                           th:href="@{/autores/{id}/editar(id=${autor.id})}">
                            <i class="bi bi-pencil-square" aria-hidden="true"></i>
                            <span>Editar</span>
                        </a>
                        <form method="post"
                              th:action="@{/autores/{id}/excluir(id=${autor.id})}"
                              th:attr="data-confirm-message=|Excluir o autor ${autor.nome}?|">
                            <button type="submit" class="btn btn-sm btn-soft-danger">
                                <i class="bi bi-trash3" aria-hidden="true"></i>
                                <span>Excluir</span>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
