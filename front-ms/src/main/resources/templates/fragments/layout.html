<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(titulo, conteudo)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo} + ' - Biblioteca'">Biblioteca</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/livros}">Sistema de Biblioteca</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Abrir navegacao">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/livros}">Livros</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/autores}">Autores</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div th:if="${sucesso}" class="alert alert-success" role="alert" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" role="alert" th:text="${erro}"></div>
    <th:block th:replace="${conteudo}"></th:block>
</main>

<footer class="border-top py-3 mt-auto">
    <div class="container text-muted small">
        IFCE - Desenvolvimento Web com Java
    </div>
</footer>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script>
    document.addEventListener('submit', function (event) {
        const form = event.target;
        const message = form.getAttribute('data-confirm-message');
        if (message && !window.confirm(message)) {
            event.preventDefault();
        }
    });
</script>
</body>
</html>
