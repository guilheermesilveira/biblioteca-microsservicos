<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(titulo, conteudo)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo} + ' - Biblioteca'">Biblioteca</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<a class="skip-link" href="#conteudo">Ir para o conteudo</a>

<nav class="navbar navbar-expand-lg app-navbar">
    <div class="container app-navbar-container">
        <a class="navbar-brand app-brand" th:href="@{/livros}">
            <span class="brand-mark" aria-hidden="true"><i class="bi bi-book-half"></i></span>
            <span>
                <span class="brand-title">Biblioteca</span>
                <span class="brand-subtitle">Microsservicos</span>
            </span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Abrir navegacao">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav app-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/livros}">
                        <i class="bi bi-journal-bookmark" aria-hidden="true"></i>
                        <span>Livros</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/autores}">
                        <i class="bi bi-person-lines-fill" aria-hidden="true"></i>
                        <span>Autores</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main id="conteudo" class="container app-main">
    <div th:if="${sucesso}" class="alert app-alert alert-success" role="alert">
        <i class="bi bi-check-circle-fill" aria-hidden="true"></i>
        <span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}" class="alert app-alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill" aria-hidden="true"></i>
        <span th:text="${erro}"></span>
    </div>
    <th:block th:replace="${conteudo}"></th:block>
</main>

<footer class="app-footer">
    <div class="container app-footer-inner">
        <span>IFCE - Desenvolvimento Web com Java</span>
        <span class="footer-dot" aria-hidden="true"></span>
        <span>Sistema de Biblioteca</span>
    </div>
</footer>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script>
    document.addEventListener('submit', function (event) {
        const form = event.target;
        const message = form.getAttribute('data-confirm-message');
        if (message && !window.confirm(message)) {
            event.preventDefault();
        }
    });
</script>
</body>
</html>
