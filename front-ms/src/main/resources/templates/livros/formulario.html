<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${modoEdicao} ? 'Editar Livro' : 'Novo Livro', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <span class="page-eyebrow">Livros</span>
            <h1 th:text="${modoEdicao} ? 'Editar livro' : 'Novo livro'">Livro</h1>
            <p class="page-subtitle" th:text="${modoEdicao} ? 'Atualizacao do acervo' : 'Novo item do acervo'">Cadastro</p>
        </div>
        <a class="btn btn-outline-secondary btn-action" th:href="@{/livros}">
            <i class="bi bi-arrow-left" aria-hidden="true"></i>
            <span>Voltar</span>
        </a>
    </div>

    <div th:if="${apiErrors}" class="alert app-alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill" aria-hidden="true"></i>
        <div>
        <div class="fw-semibold mb-1">A API retornou erros de validação:</div>
        <ul class="mb-0">
            <li th:each="erroApi : ${apiErrors}" th:text="${erroApi.key + ': ' + erroApi.value}">Erro</li>
        </ul>
        </div>
    </div>

    <form class="form-panel"
          method="post"
          th:object="${livroForm}"
          th:action="${modoEdicao} ? @{/livros/{id}(id=${livroId})} : @{/livros}">
        <div class="panel-title">
            <i class="bi bi-journal-bookmark" aria-hidden="true"></i>
            <span>Dados do livro</span>
        </div>

        <div class="field-group">
            <label for="titulo" class="form-label">Título</label>
            <input id="titulo" type="text" class="form-control" th:field="*{titulo}"
                   th:classappend="${#fields.hasErrors('titulo')} ? ' is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
        </div>

        <div class="field-group">
            <label for="genero" class="form-label">Gênero</label>
            <input id="genero" type="text" class="form-control" th:field="*{genero}"
                   th:classappend="${#fields.hasErrors('genero')} ? ' is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="field-group">
                <label for="anoPublicacao" class="form-label">Ano de publicação</label>
                <input id="anoPublicacao" type="number" min="1" class="form-control" th:field="*{anoPublicacao}"
                       th:classappend="${#fields.hasErrors('anoPublicacao')} ? ' is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('anoPublicacao')}"
                     th:errors="*{anoPublicacao}"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="field-group">
                <label for="autorId" class="form-label">Autor</label>
                <select id="autorId" class="form-select" th:field="*{autorId}"
                        th:classappend="${#fields.hasErrors('autorId')} ? ' is-invalid'">
                    <option value="">Selecione</option>
                    <option th:each="autor : ${autores}" th:value="${autor.id}" th:text="${autor.nome}">Autor</option>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('autorId')}" th:errors="*{autorId}"></div>
                </div>
            </div>
        </div>

        <div class="form-check form-switch availability-switch">
            <input type="hidden" name="disponivel" value="false">
            <input id="disponivel" class="form-check-input" type="checkbox" th:field="*{disponivel}" value="true">
            <label for="disponivel" class="form-check-label">Livro disponível para empréstimo</label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-action">
                <i class="bi bi-check2" aria-hidden="true"></i>
                <span th:text="${modoEdicao} ? 'Atualizar' : 'Salvar'">Salvar</span>
            </button>
            <a class="btn btn-outline-secondary btn-action" th:href="@{/livros}">
                <i class="bi bi-x-lg" aria-hidden="true"></i>
                <span>Cancelar</span>
            </a>
        </div>
    </form>
</section>
</html>
