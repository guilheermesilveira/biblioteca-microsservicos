<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Livros', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <span class="page-eyebrow">Catálogo</span>
            <h1>Livros</h1>
            <p class="page-subtitle">
                <span th:text="${#lists.size(livros)}">0</span>
                <span th:text="${#lists.size(livros) == 1} ? 'registro encontrado' : 'registros encontrados'">registros encontrados</span>
            </p>
        </div>
        <a class="btn btn-primary btn-action" th:href="@{/livros/novo}">
            <i class="bi bi-plus-lg" aria-hidden="true"></i>
            <span>Novo Livro</span>
        </a>
    </div>

    <div class="filter-bar" aria-label="Filtro de disponibilidade">
        <a class="filter-pill"
           th:classappend="${filtroDisponivel == null} ? ' is-active' : ''"
           th:href="@{/livros}">
            <i class="bi bi-grid" aria-hidden="true"></i>
            <span>Todos</span>
        </a>
        <a class="filter-pill"
           th:classappend="${filtroDisponivel == true} ? ' is-active success' : ''"
           th:href="@{/livros(disponivel=true)}">
            <i class="bi bi-check2-circle" aria-hidden="true"></i>
            <span>Disponíveis</span>
        </a>
        <a class="filter-pill"
           th:classappend="${filtroDisponivel == false} ? ' is-active muted' : ''"
           th:href="@{/livros(disponivel=false)}">
            <i class="bi bi-slash-circle" aria-hidden="true"></i>
            <span>Indisponíveis</span>
        </a>
    </div>

    <div class="table-panel table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th>Título</th>
                <th>Gênero</th>
                <th>Ano</th>
                <th>Disponível</th>
                <th>Autor</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr class="empty-row" th:if="${#lists.isEmpty(livros)}">
                <td colspan="6">
                    <div class="empty-state">
                        <i class="bi bi-journal-x" aria-hidden="true"></i>
                        <strong>Nenhum livro encontrado.</strong>
                    </div>
                </td>
            </tr>
            <tr th:each="livro : ${livros}">
                <td class="fw-semibold" data-label="Título">
                    <a class="table-title-link" th:href="@{/livros/{id}(id=${livro.id})}" th:text="${livro.titulo}">Titulo</a>
                </td>
                <td data-label="Gênero" th:text="${livro.genero}">Gênero</td>
                <td data-label="Ano" th:text="${livro.anoPublicacao}">2000</td>
                <td data-label="Disponível">
                    <span class="status-badge"
                          th:classappend="${livro.disponivel} ? ' available' : ' unavailable'"
                          th:text="${livro.disponivel} ? 'Sim' : 'Não'">Sim</span>
                </td>
                <td class="author-cell"
                    data-label="Autor"
                    th:classappend="${livro.autorNome == 'Autor removido'} ? ' author-missing' : ''"
                    th:text="${livro.autorNome}">Autor</td>
                <td class="text-end" data-label="Ações">
                    <div class="table-actions">
                        <a class="btn btn-sm btn-soft-primary" th:href="@{/livros/{id}(id=${livro.id})}">
                            <i class="bi bi-eye" aria-hidden="true"></i>
                            <span>Detalhes</span>
                        </a>
                        <a class="btn btn-sm btn-soft-secondary"
                           th:href="@{/livros/{id}/editar(id=${livro.id})}">
                            <i class="bi bi-pencil-square" aria-hidden="true"></i>
                            <span>Editar</span>
                        </a>
                        <form method="post"
                              th:action="@{/livros/{id}/excluir(id=${livro.id})}"
                              th:attr="data-confirm-message=|Excluir o livro ${livro.titulo}?|">
                            <button type="submit" class="btn btn-sm btn-soft-danger">
                                <i class="bi bi-trash3" aria-hidden="true"></i>
                                <span>Excluir</span>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
