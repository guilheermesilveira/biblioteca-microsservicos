<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Detalhe do Livro', ~{::section})}">
<section>
    <div class="page-header">
        <div>
            <span class="page-eyebrow">Detalhe do livro</span>
            <h1 th:text="${livro.titulo}">Título</h1>
            <p class="page-subtitle" th:text="${autorNome}">Autor</p>
        </div>
        <div class="header-actions">
            <a class="btn btn-outline-secondary btn-action" th:href="@{/livros}">
                <i class="bi bi-arrow-left" aria-hidden="true"></i>
                <span>Voltar</span>
            </a>
            <a class="btn btn-primary btn-action" th:href="@{/livros/{id}/editar(id=${livro.id})}">
                <i class="bi bi-pencil-square" aria-hidden="true"></i>
                <span>Editar</span>
            </a>
        </div>
    </div>

    <dl class="detail-list">
        <div class="detail-list-title">
            <dt>Resumo</dt>
            <dd>
                <span class="status-badge"
                      th:classappend="${livro.disponivel} ? ' available' : ' unavailable'"
                      th:text="${livro.disponivel} ? 'Disponível' : 'Indisponível'">Disponível</span>
            </dd>
        </div>
        <div>
            <dt>ID</dt>
            <dd th:text="${livro.id}">1</dd>
        </div>
        <div>
            <dt>Título</dt>
            <dd th:text="${livro.titulo}">Título</dd>
        </div>
        <div>
            <dt>Gênero</dt>
            <dd th:text="${livro.genero}">Gênero</dd>
        </div>
        <div>
            <dt>Ano de publicação</dt>
            <dd th:text="${livro.anoPublicacao}">2000</dd>
        </div>
        <div>
            <dt>Disponível</dt>
            <dd>
                <span class="status-badge"
                      th:classappend="${livro.disponivel} ? ' available' : ' unavailable'"
                      th:text="${livro.disponivel} ? 'Sim' : 'Não'">Sim</span>
            </dd>
        </div>
        <div>
            <dt>Autor ID</dt>
            <dd th:text="${livro.autorId}">1</dd>
        </div>
        <div>
            <dt>Autor</dt>
            <dd th:classappend="${autorNome == 'Autor removido'} ? ' author-missing' : ''"
                th:text="${autorNome}">Autor</dd>
        </div>
    </dl>
</section>
</html>
